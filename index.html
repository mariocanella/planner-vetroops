      nome: document.getElementById('tec-nuovo-nome').value,
      comune: document.getElementById('tec-nuovo-comune').value,
      competenza: document.getElementById('tec-nuovo-competenza').value,
    }, c);
  };
  state._prefillRange = null;
  document.getElementById('tc-range-applica').onclick = async () => {
    const nome = document.getElementById('tc-range-nome').value;
    const da = document.getElementById('tc-range-da').value;
    const a = document.getElementById('tc-range-a').value;
    const tipo = document.getElementById('tc-range-stato').value;
    const nota = document.getElementById('tc-range-nota').value;
    const errBox = document.getElementById('tc-range-error');
    if (!da || !a) { errBox.textContent = 'Indica data inizio e fine.'; return; }
    if (a < da) { errBox.textContent = 'La data finale deve essere uguale o successiva a quella iniziale.'; return; }
    errBox.textContent = '';
    await applyDispoRange(nome, da, a, tipo, nota, c);
  };

  const body = document.getElementById('tc-body');
  body.innerHTML = list.map(t => {
    const key = dispoKey(data, t.nome);
    const ov = state.dispo[key];
    const tipo = ov ? ov.tipo : 'disponibile';
    const nota = ov ? (ov.note || '') : '';
    const daTurnistica = state.dispoTurnistica[key];
    return `
      <tr>
        <td><strong>${escapeHtml(t.nome)}</strong></td>
        <td>${escapeHtml(t.comune)}</td>
        <td>
          <select class="select-status tc-status" data-nome="${escapeHtml(t.nome)}">
            <option value="disponibile" ${tipo==='disponibile'?'selected':''}>Disponibile</option>
            ${isAdmin ? `<option value="ferie" ${tipo==='ferie'?'selected':''}>Ferie</option>` : ''}
            <option value="malattia" ${tipo==='malattia'?'selected':''}>Malattia</option>
            <option value="infortunio" ${tipo==='infortunio'?'selected':''}>Infortunio</option>
            <option value="indisponibile" ${tipo==='indisponibile'?'selected':''}>Indisponibile</option>
          </select>
          ${daTurnistica && !ov ? `<div style="font-size:10.5px;color:var(--ink-faint);margin-top:3px">🔗 Da Turnistica: ${capLabel(daTurnistica.tipo)}</div>` : ''}
          ${daTurnistica && ov && daTurnistica.tipo !== ov.tipo ? `<div style="font-size:10.5px;color:var(--amber);margin-top:3px">⚠ Turnistica dice: ${capLabel(daTurnistica.tipo)} (qui vince la modifica diretta)</div>` : ''}
        </td>
        <td><input type="text" class="tc-note" data-nome="${escapeHtml(t.nome)}" value="${escapeHtml(nota)}" placeholder="facoltativa" style="min-width:160px"></td>
      </tr>`;
  }).join('');

  body.querySelectorAll('.tc-status').forEach(sel => {
    sel.onchange = async () => {
      await applyDispoChange(sel.dataset.nome, data, sel.value, body.querySelector(`.tc-note[data-nome="${CSS.escape(sel.dataset.nome)}"]`).value);
    };
  });
  body.querySelectorAll('.tc-note').forEach(inp => {
    inp.onchange = async () => {
      const sel = body.querySelector(`.tc-status[data-nome="${CSS.escape(inp.dataset.nome)}"]`);
      await applyDispoChange(inp.dataset.nome, data, sel.value, inp.value);
    };
  });
}

async function applyDispoChange(nome, data, tipo, nota) {
  await refreshData();
  const dispo = { ...state.dispo };
  const key = dispoKey(data, nome);
  if (tipo === 'disponibile') delete dispo[key]; // "Disponibile" azzera sempre il blocco, nota inclusa
  else dispo[key] = { tipo, note: nota || '' };
  const ok = await saveDispo(dispo);
  if (ok) { state.dispo = dispo; toast('Disponibilità aggiornata'); }
}

const RANGE_GIORNI_MAX = 366; // limite di sicurezza per evitare intervalli enormi per errore
async function applyDispoRange(nome, dataDa, dataA, tipo, nota, c, onDone) {
  await refreshData();
  const dispo = { ...state.dispo };
  let iso = dataDa;
  let giorni = 0;
  while (iso <= dataA && giorni < RANGE_GIORNI_MAX) {
    const key = dispoKey(iso, nome);
    if (tipo === 'disponibile') delete dispo[key]; // "Disponibile" azzera sempre il blocco, nota inclusa
    else dispo[key] = { tipo, note: nota || '' };
    iso = addDaysISO(iso, 1);
    giorni++;
  }
  const ok = await saveDispo(dispo);
  if (ok) {
    state.dispo = dispo;
    const label = tipo === 'disponibile' ? 'Disponibile' : tipo === 'ferie' ? 'Ferie' : tipo === 'malattia' ? 'Malattia' : tipo === 'infortunio' ? 'Infortunio' : 'Indisponibile';
    toast(`${nome}: stato "${label}" applicato dal ${fmtDate(dataDa)} al ${fmtDate(dataA)} (${giorni} giorni)`);
    if (onDone) onDone(); else renderTecnici(c);
  } else {
    toast('Errore nel salvataggio, riprova.');
  }
}

// ============================================================
// TAB: DASHBOARD
// ============================================================
function renderDashboard(c) {
  const scope = roleScopeComuni();
  const period = state.dashPeriod || 'oggi';
  const today = todayISO();
  const inPeriod = (iso) => {
    if (period === 'oggi') return iso === today;
    const d = new Date(iso), t = new Date(today);
    const diff = (d - t) / 86400000;
    const day = t.getDay(); // 0=dom
    const offsetMon = day === 0 ? -6 : 1 - day;
    const monday = new Date(t); monday.setDate(t.getDate() + offsetMon);
    const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
    return d >= monday && d <= sunday;
  };

  const jobsScope = state.jobs.filter(j => j.stato === 'confermato' && j.comune && scope.includes(j.comune) && j.data && inPeriod(j.data));
  const daVerificare = state.jobs.filter(j => j.stato === 'da_verificare'); // CAP non coperto: nessuna sede attribuibile, visibile a tutti
  const nuoviDaProporre = state.jobs.filter(j => j.stato === 'nuovo' && j.comune && scope.includes(j.comune));
  const proposteInAttesa = state.jobs.filter(j => j.stato === 'proposto' && j.comune && scope.includes(j.comune));
  const counts = { verde: 0, giallo: 0, rosso: 0 };
  jobsScope.forEach(j => { if (j.semaforo) counts[j.semaforo]++; });

  const techsScope = tecnici.filter(t => scope.includes(t.comune));
  const techToday = techsScope.map(t => {
    const occ = minutiOccupati(t.nome, today);
    return { ...t, occ, sem: semaforo(occ), dispo: statoDisponibilita(t.nome, today) };
  });
  const nonDisponibiliOggi = techToday.filter(t => t.dispo !== 'disponibile');
  const rossiOggi = techToday.filter(t => t.dispo === 'disponibile' && t.sem === 'rosso');

  const perSede = scope.map(comune => {
    const j = jobsScope.filter(x => x.comune === comune);
    const totMin = j.reduce((s, x) => s + (x.tempoTotale || 0), 0);
    const nTech = (tecniciByComune[comune] || []).length;
    return { comune, nJob: j.length, totMin, nTech };
  });

  c.innerHTML = `
    <div class="top-controls">
      <div style="display:flex;gap:6px">
        <button class="btn btn-sm ${period==='oggi'?'btn-primary':'btn-ghost'}" id="dp-oggi">Oggi</button>
        <button class="btn btn-sm ${period==='settimana'?'btn-primary':'btn-ghost'}" id="dp-settimana">Questa settimana</button>
      </div>
    </div>

    <div class="grid-4" style="margin-bottom:16px">
      <div class="kpi-card"><div class="kpi-num">${jobsScope.length}</div><div class="kpi-label">Job confermati</div></div>
      <div class="kpi-card"><div class="kpi-num">${nuoviDaProporre.length}</div><div class="kpi-label">Nuovi da proporre</div></div>
      <div class="kpi-card"><div class="kpi-num">${proposteInAttesa.length}</div><div class="kpi-label">In attesa risposta cliente</div></div>
      <div class="kpi-card"><div class="kpi-num">${daVerificare.length}</div><div class="kpi-label">Da verificare (CAP non coperto)</div></div>
    </div>
    <div class="grid-3" style="margin-bottom:16px">
      <div class="kpi-card"><div class="kpi-num">${nonDisponibiliOggi.length}</div><div class="kpi-label">Tecnici assenti oggi</div></div>
    </div>

    <div class="grid-3" style="margin-bottom:16px">
      <div class="kpi-card"><div class="kpi-num" style="color:var(--green)">${counts.verde}</div><div class="kpi-label">Giornate verdi</div></div>
      <div class="kpi-card"><div class="kpi-num" style="color:#95661C">${counts.giallo}</div><div class="kpi-label">Giornate gialle</div></div>
      <div class="kpi-card"><div class="kpi-num" style="color:var(--red)">${counts.rosso}</div><div class="kpi-label">Giornate rosse</div></div>
    </div>

    ${rossiOggi.length ? `<div class="banner banner-danger"><div>⚠</div><div><strong>${rossiOggi.length} tecnici in sovraccarico oggi</strong> (oltre ${SOGLIA_GIALLO} min): ${rossiOggi.map(t=>escapeHtml(t.nome)).join(', ')}</div></div>` : ''}

    <div class="panel">
      <div class="section-title">Riepilogo per sede</div>
      <div class="section-sub">Target: 3 lavori/giorno per tecnico · capacità netta ${CAPACITA_MIN} min/giorno</div>
      <table class="data">
        <thead><tr><th>Sede</th><th>Tecnici</th><th>Job</th><th>Minuti totali</th><th>Capacità usata</th></tr></thead>
        <tbody>
          ${perSede.map(r => {
            const capTot = r.nTech * CAPACITA_MIN * (period === 'settimana' ? 6 : 1);
            const pct = capTot ? Math.min(100, Math.round((r.totMin / capTot) * 100)) : 0;
            return `<tr>
              <td><strong>${escapeHtml(r.comune)}</strong></td>
              <td>${r.nTech}</td>
              <td>${r.nJob}</td>
              <td>${r.totMin}</td>
              <td style="display:flex;align-items:center;gap:8px;min-width:140px">
                <div class="bar-track" style="width:80px"><div class="bar-fill" style="width:${pct}%;background:var(--brand)"></div></div>
                <span style="font-size:12px;color:var(--ink-soft)">${pct}%</span>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
    ${roles[state.user].admin ? `
    <div class="panel" style="margin-top:16px">
      <div class="section-title">Backup</div>
      <div class="section-sub">Il piano gratuito di Firebase non include backup automatici. Scarica una copia dei dati ogni tanto (es. una volta a settimana) come rete di sicurezza.</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-primary btn-sm" id="db-backup-esporta">⬇ Scarica backup</button>
        <button class="btn btn-ghost btn-sm" id="db-backup-importa-btn">⬆ Ripristina da backup</button>
        <input type="file" id="db-backup-importa-file" accept="application/json" style="display:none">
      </div>
    </div>` : ''}
  `;
  document.getElementById('dp-oggi').onclick = () => { state.dashPeriod = 'oggi'; renderDashboard(c); };
  document.getElementById('dp-settimana').onclick = () => { state.dashPeriod = 'settimana'; renderDashboard(c); };
  const backupBtn = document.getElementById('db-backup-esporta');
  if (backupBtn) backupBtn.onclick = () => esportaBackup();
  const importBtn = document.getElementById('db-backup-importa-btn');
  const importFile = document.getElementById('db-backup-importa-file');
  if (importBtn) importBtn.onclick = () => importFile.click();
  if (importFile) importFile.onchange = (e) => importaBackup(e.target.files[0], c);
}

function esportaBackup() {
  const payload = {
    esportatoIl: new Date().toISOString(),
    jobs: state.jobs,
    dispo: state.dispo,
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `backup_planner_${todayISO()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Backup scaricato');
}

async function importaBackup(file, c) {
  if (!file) return;
  if (!confirm('Ripristinare da questo backup sostituirà TUTTI i job e le disponibilità attuali. Procedere?')) return;
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    if (!Array.isArray(data.jobs) || typeof data.dispo !== 'object') {
      toast('File di backup non valido.');
      return;
    }
    const okJobs = await saveJobs(data.jobs);
    const okDispo = await saveDispo(data.dispo);
    if (okJobs && okDispo) {
      state.jobs = data.jobs;
      state.dispo = data.dispo;
      toast('Backup ripristinato correttamente');
      renderDashboard(c);
    } else {
      toast('Errore durante il ripristino, riprova.');
    }
  } catch (e) {
    console.error('import backup failed', e);
    toast('File non leggibile: assicurati sia un backup esportato da questa app.');
  }
}

// ---------- cattura errori globale (visibile direttamente in pagina, senza bisogno della Console) ----------
function mostraErroreGlobale(err) {
  try {
    let box = document.getElementById('errore-globale-box');
    if (!box) {
      box = document.createElement('div');
      box.id = 'errore-globale-box';
      box.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#C94A3E;color:#fff;padding:14px 16px;font-family:ui-monospace,Menlo,monospace;font-size:11.5px;line-height:1.5;z-index:99999;max-height:45vh;overflow:auto;white-space:pre-wrap;word-break:break-word;box-shadow:0 -4px 20px rgba(0,0,0,.3);';
      const chiudi = document.createElement('button');
      chiudi.textContent = '✕ Chiudi';
      chiudi.style.cssText = 'position:sticky;top:0;float:right;background:#fff;color:#C94A3E;border:none;border-radius:6px;padding:4px 10px;font-weight:700;cursor:pointer;font-family:-apple-system,sans-serif;font-size:11px;margin-bottom:8px;';
      chiudi.onclick = () => box.remove();
      box.appendChild(chiudi);
      const testo = document.createElement('div');
      testo.id = 'errore-globale-testo';
      box.appendChild(testo);
      document.body.appendChild(box);
    }
    const testo = document.getElementById('errore-globale-testo');
    const ts = new Date().toLocaleTimeString('it-IT');
    const msg = (err && err.stack) || (err && err.message) || String(err);
    testo.textContent = `[${ts}] ERRORE:\n${msg}\n\n` + testo.textContent;
  } catch (e2) { /* se anche questo fallisce, non c'è altro da fare */ }
}
window.addEventListener('error', function (event) {
  mostraErroreGlobale(event.error || event.message);
});
window.addEventListener('unhandledrejection', function (event) {
  mostraErroreGlobale(event.reason);
});

// ---------- avvio ----------
mostraTracciaSessionePrecedente();
init();

</script>
