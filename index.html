<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planner Officina Mobile</title>
<style>
:root{
  --bg:#F2F4F1;
  --panel:#FFFFFF;
  --ink:#1B241F;
  --ink-soft:#5C665F;
  --ink-faint:#8A938C;
  --line:#DFE3DC;
  --line-soft:#ECEFEA;
  --brand:#1F4A44;
  --brand-dark:#173733;
  --brand-tint:#E3ECE9;
  --amber:#E0993A;
  --amber-tint:#FBF0DE;
  --green:#2E8F5B;
  --green-tint:#E4F3EA;
  --red:#C94A3E;
  --red-tint:#FBE9E7;
  --radius:10px;
  --radius-lg:16px;
  --shadow:0 1px 2px rgba(20,30,25,.06), 0 8px 24px -12px rgba(20,30,25,.18);
  --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  background:var(--bg);
  color:var(--ink);
  font-family:var(--sans);
  -webkit-font-smoothing:antialiased;
}
#app{min-height:100vh;display:flex;flex-direction:column}
.hidden{display:none !important}

/* ---------- login ---------- */
.login-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:
    radial-gradient(1200px 600px at 15% -10%, #24544E 0%, transparent 60%),
    var(--brand-dark);
  padding:24px;
}
.login-card{
  background:var(--panel);
  border-radius:var(--radius-lg);
  padding:40px 36px;
  width:100%;max-width:420px;
  box-shadow:0 30px 60px -20px rgba(0,0,0,.45);
}
.login-eyebrow{
  font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);
  font-weight:700;margin-bottom:6px;
}
.login-title{font-size:24px;font-weight:800;letter-spacing:-.01em;margin:0 0 4px;color:var(--brand-dark)}
.login-sub{color:var(--ink-soft);font-size:14px;margin:0 0 28px;line-height:1.5}
.role-btn{
  display:flex;align-items:center;gap:14px;width:100%;
  padding:16px 16px;margin-bottom:10px;border-radius:12px;border:1.5px solid var(--line);
  background:var(--panel);cursor:pointer;text-align:left;font-family:inherit;
  transition:border-color .15s, background .15s, transform .1s;
}
.role-btn:hover{border-color:var(--brand);background:var(--brand-tint)}
.role-btn:active{transform:scale(.99)}
.role-avatar{
  width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:800;color:#fff;font-size:15px;flex-shrink:0;
}
.role-name{font-weight:700;font-size:15px;color:var(--ink)}
.role-desc{font-size:12.5px;color:var(--ink-soft);margin-top:1px}

/* ---------- shell ---------- */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 22px;background:var(--brand-dark);color:#fff;flex-shrink:0;
}
.brand-block{display:flex;align-items:center;gap:10px}
.brand-mark{
  width:30px;height:30px;border-radius:8px;background:var(--amber);
  display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--brand-dark);font-size:14px;
}
.brand-text{font-weight:800;font-size:14.5px;letter-spacing:-.01em}
.brand-text small{display:block;font-weight:500;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;opacity:.6}
.topbar-right{display:flex;align-items:center;gap:14px}
.user-pill{
  display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.1);
  padding:6px 12px 6px 6px;border-radius:100px;font-size:13px;font-weight:600;
}
.user-pill .role-avatar{width:24px;height:24px;font-size:11px}
.link-btn{
  background:none;border:none;color:rgba(255,255,255,.65);font-size:12.5px;cursor:pointer;
  font-family:inherit;text-decoration:underline;text-underline-offset:2px;padding:4px;
}
.link-btn:hover{color:#fff}

.tabbar{
  display:flex;gap:4px;padding:0 18px;background:var(--panel);border-bottom:1px solid var(--line);
  flex-shrink:0;overflow-x:auto;
}
.tab-btn{
  padding:13px 16px;border:none;background:none;font-family:inherit;font-size:13.5px;font-weight:700;
  color:var(--ink-faint);cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;
  transition:color .12s;
}
.tab-btn:hover{color:var(--ink)}
.tab-btn.active{color:var(--brand);border-bottom-color:var(--brand)}

.content{flex:1;padding:22px;max-width:1200px;width:100%;margin:0 auto}
.content-narrow{max-width:760px}

/* ---------- generic bits ---------- */
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius-lg);padding:22px}
.panel + .panel{margin-top:16px}
.section-title{font-size:15px;font-weight:800;margin:0 0 4px;color:var(--brand-dark)}
.section-sub{font-size:12.5px;color:var(--ink-soft);margin:0 0 18px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
@media (max-width:720px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}}

label.field{display:block;margin-bottom:14px}
label.field .lbl{display:block;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);margin-bottom:6px}
input[type=text],input[type=number],input[type=date],select,textarea{
  width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:8px;font-family:inherit;
  font-size:14px;color:var(--ink);background:#fff;transition:border-color .12s;
}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--brand)}
textarea{resize:vertical;min-height:60px}
.hint{font-size:12px;color:var(--ink-faint);margin-top:5px}
.hint.warn{color:var(--red);font-weight:600}
.hint.ok{color:var(--green);font-weight:600}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:11px 20px;border-radius:9px;border:none;font-family:inherit;font-weight:700;font-size:14px;
  cursor:pointer;transition:filter .12s, transform .08s;
}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--brand);color:#fff}
.btn-primary:hover{filter:brightness(1.1)}
.btn-primary:disabled{background:#B7C0BC;cursor:not-allowed}
.btn-ghost{background:var(--line-soft);color:var(--ink)}
.btn-ghost:hover{background:var(--line)}
.btn-danger{background:var(--red-tint);color:var(--red)}
.btn-danger:hover{background:#F6D6D2}
.btn-sm{padding:7px 12px;font-size:12.5px;border-radius:7px}

.badge{
  display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:100px;
  font-size:11.5px;font-weight:800;letter-spacing:.02em;text-transform:uppercase;
}
.badge-verde{background:var(--green-tint);color:var(--green)}
.badge-giallo{background:var(--amber-tint);color:#95661C}
.badge-rosso{background:var(--red-tint);color:var(--red)}
.badge-grigio{background:var(--line-soft);color:var(--ink-soft)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-verde{background:var(--green)}
.dot-giallo{background:var(--amber)}
.dot-rosso{background:var(--red)}
.dot-grigio{background:var(--ink-faint)}

.bar-track{height:7px;border-radius:100px;background:var(--line-soft);overflow:hidden;flex:1}
.bar-fill{height:100%;border-radius:100px;transition:width .25s}

.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--brand-dark);color:#fff;padding:12px 20px;border-radius:10px;font-size:13.5px;font-weight:600;
  box-shadow:var(--shadow);z-index:999;display:flex;align-items:center;gap:10px;
  animation:toastin .18s ease-out;
}
@keyframes toastin{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}

.empty-state{
  text-align:center;padding:36px 20px;color:var(--ink-faint);font-size:13.5px;
}

table.data{width:100%;border-collapse:collapse;font-size:13px}
table.data th{
  text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-faint);
  font-weight:700;padding:0 10px 8px;border-bottom:1px solid var(--line);
}
table.data td{padding:10px 10px;border-bottom:1px solid var(--line-soft);vertical-align:middle}
table.data tr:last-child td{border-bottom:none}

.kv-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line-soft);font-size:13.5px}
.kv-row:last-child{border-bottom:none}
.kv-row .k{color:var(--ink-soft)}
.kv-row .v{font-weight:700}

.pill-choice{
  display:flex;align-items:center;gap:10px;padding:10px 12px;border:1.5px solid var(--line);border-radius:9px;
  cursor:pointer;margin-bottom:8px;transition:border-color .12s,background .12s;
}
.pill-choice:hover{border-color:var(--brand)}
.pill-choice.selected{border-color:var(--brand);background:var(--brand-tint)}
.pill-choice input{width:auto;flex-shrink:0}
.pill-choice .pc-main{flex:1;min-width:0}
.pill-choice .pc-name{font-weight:700;font-size:13.5px}
.pill-choice .pc-meta{font-size:12px;color:var(--ink-soft);display:flex;align-items:center;gap:6px;margin-top:3px}

.kpi-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius-lg);padding:18px}
.kpi-num{font-size:28px;font-weight:800;color:var(--brand-dark);letter-spacing:-.02em}
.kpi-label{font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);font-weight:700;margin-top:4px}

.sede-card{margin-bottom:14px}
.sede-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;cursor:pointer}
.sede-head-l{display:flex;align-items:center;gap:10px}
.sede-title{font-weight:800;font-size:14.5px}
.sede-addr{font-size:11.5px;color:var(--ink-faint);margin-top:1px}
.chev{transition:transform .15s;color:var(--ink-faint)}
.chev.open{transform:rotate(90deg)}

.tech-row{
  display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line-soft);
}
.tech-row:last-child{border-bottom:none}
.tech-name{font-weight:700;font-size:13.5px;width:170px;flex-shrink:0}
.tech-mins{font-size:12px;color:var(--ink-soft);width:110px;flex-shrink:0;text-align:right}
.job-sub{background:var(--bg);border-radius:8px;padding:10px 12px;margin-top:8px;font-size:12.5px}
.job-sub-row{display:flex;justify-content:space-between;gap:10px;padding:6px 0;border-bottom:1px dashed var(--line)}
.job-sub-row:last-child{border-bottom:none}

.select-status{
  padding:6px 10px;border-radius:7px;border:1.5px solid var(--line);font-size:12.5px;font-family:inherit;background:#fff;
}

.top-controls{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:18px}
.top-controls label.field{margin-bottom:0;min-width:150px}

.banner{
  display:flex;gap:10px;align-items:flex-start;padding:12px 14px;border-radius:9px;font-size:13px;margin-bottom:16px;
}
.banner-warn{background:var(--amber-tint);color:#8A5D19}
.banner-info{background:var(--brand-tint);color:var(--brand-dark)}
.banner-danger{background:var(--red-tint);color:var(--red)}

.footer-note{font-size:11.5px;color:var(--ink-faint);text-align:center;padding:20px 0 6px}
::placeholder{color:#B4BBB5}

.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.cal-title{font-size:18px;font-weight:800;color:var(--brand-dark);min-width:170px;text-transform:capitalize}
.cal-nav{display:flex;gap:6px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.cal-weekday{text-align:center;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-faint);padding-bottom:4px}
.cal-cell{
  background:var(--panel);border:1px solid var(--line);border-radius:10px;min-height:92px;padding:8px;
  cursor:pointer;transition:border-color .12s,box-shadow .12s;display:flex;flex-direction:column;gap:6px;
}
.cal-cell:hover{border-color:var(--brand);box-shadow:0 2px 10px -4px rgba(31,74,68,.25)}
.cal-cell.empty{background:transparent;border-color:transparent;cursor:default;box-shadow:none}
.cal-cell.today{border-color:var(--brand);border-width:2px}
.cal-daynum{font-size:12.5px;font-weight:700;color:var(--ink-soft)}
.cal-cell.today .cal-daynum{color:var(--brand-dark)}
.cal-jobcount{
  font-size:11px;font-weight:800;padding:2px 7px;border-radius:100px;align-self:flex-start;
}
.cal-techline{font-size:10.5px;color:var(--ink-soft);line-height:1.5;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.day-modal-overlay{
  position:fixed;inset:0;background:rgba(20,30,25,.45);display:flex;align-items:center;justify-content:center;
  z-index:1000;padding:20px;
}
.day-modal-card{background:#fff;border-radius:var(--radius-lg);padding:26px;width:100%;max-width:560px;max-height:85vh;overflow-y:auto;box-shadow:0 30px 60px -20px rgba(0,0,0,.4)}
.day-modal-close{float:right;background:none;border:none;font-size:20px;line-height:1;cursor:pointer;color:var(--ink-faint)}
.day-modal-close:hover{color:var(--ink)}

.ferie-scroll{overflow-x:auto;border:1px solid var(--line);border-radius:10px}
table.ferie{border-collapse:collapse;font-size:11px;white-space:nowrap}
table.ferie th, table.ferie td{padding:0;text-align:center}
table.ferie th.ferie-corner{position:sticky;left:0;z-index:3;background:var(--panel);text-align:left;padding:8px 12px;min-width:170px;border-right:2px solid var(--line)}
table.ferie th.ferie-week{padding:4px 2px;font-weight:700;color:var(--ink-faint);font-size:9.5px;border-bottom:1px solid var(--line);min-width:20px}
table.ferie th.ferie-week.mese-nuovo{border-left:2px solid var(--ink-faint)}
table.ferie td.ferie-nome{position:sticky;left:0;z-index:2;background:var(--panel);text-align:left;padding:6px 12px;font-weight:700;font-size:12px;border-right:2px solid var(--line);border-bottom:1px solid var(--line-soft)}
table.ferie td.ferie-sede{font-size:10px;font-weight:500;color:var(--ink-faint);display:block}
table.ferie td.ferie-cell{width:20px;height:26px;border-bottom:1px solid var(--line-soft);cursor:pointer}
table.ferie td.ferie-cell.mese-nuovo{border-left:2px solid var(--ink-faint)}
table.ferie td.ferie-cell:hover{outline:2px solid var(--brand);outline-offset:-2px}
.ferie-legend{display:flex;gap:16px;align-items:center;flex-wrap:wrap;font-size:12px;margin-bottom:14px}
.ferie-legend-item{display:flex;align-items:center;gap:6px}
.ferie-legend-swatch{width:14px;height:14px;border-radius:3px}

.modal-overlay{
  position:fixed;inset:0;background:rgba(20,30,25,.45);display:flex;align-items:center;justify-content:center;
  z-index:1000;padding:20px;
}
.modal-card{background:#fff;border-radius:var(--radius-lg);padding:28px;width:100%;max-width:380px;box-shadow:0 30px 60px -20px rgba(0,0,0,.4)}
.modal-title{font-size:17px;font-weight:800;margin:0 0 4px;color:var(--brand-dark)}
.modal-sub{font-size:13px;color:var(--ink-soft);margin:0 0 18px}
</style>
</head>

  <div id="app-loading" style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Roboto,Helvetica,Arial,sans-serif; background:#F2F4F1; color:#1F4A44;">
    <div style="text-align:center;">
      <div style="width:34px;height:34px;border:3px solid #DCEAE6;border-top-color:#1F4A44;border-radius:50%;margin:0 auto 14px;animation:spin 0.8s linear infinite;"></div>
      <div style="font-size:14px;font-weight:700;">Caricamento Planner Officina Mobile…</div>
    </div>
  </div>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
<script>
  if (window.location.protocol === 'file:') {
    document.getElementById('app-loading').innerHTML = `
      <div style="max-width:440px; text-align:center;">
        <div style="font-size:40px; margin-bottom:16px;">📂</div>
        <div style="font-size:20px; font-weight:800; margin-bottom:10px; color:#1F4A44;">Questo file va aperto online, non in locale</div>
        <div style="font-size:14.5px; line-height:1.6; color:#5C665F;">
          Hai aperto il file direttamente dal computer. Per motivi di sicurezza del browser, così non può funzionare: caricalo invece sul sito Netlify (rinominalo <code>index.html</code> e trascinalo nella pagina "Production deploys"), poi apri il link <code>.netlify.app</code>.
        </div>
      </div>`;
  } else {
    // Se dopo un tempo ragionevole l'app non si è ancora inizializzata (connessione lenta o problema),
    // aggiunge un messaggio di attesa più lungo senza far pensare a un blocco totale.
    setTimeout(() => {
      const el = document.getElementById('app-loading');
      if (el) {
        const sub = document.createElement('div');
        sub.style.cssText = 'font-size:12px;color:#5C665F;margin-top:8px;';
        sub.textContent = 'Il primo caricamento può richiedere qualche secondo in più del solito.';
        el.querySelector('div').appendChild(sub);
      }
    }, 4000);
    // Se dopo 20 secondi l'app risulta ancora bloccata sul caricamento, mostra un messaggio chiaro
    // invece di lasciare la pagina bloccata senza spiegazioni.
    setTimeout(() => {
      const el = document.getElementById('app-loading');
      if (el) {
        el.innerHTML = `
          <div style="max-width:440px; text-align:center;">
            <div style="font-size:40px; margin-bottom:16px;">⚠️</div>
            <div style="font-size:20px; font-weight:800; margin-bottom:10px; color:#1F4A44;">Il caricamento sta impiegando troppo tempo</div>
            <div style="font-size:14.5px; line-height:1.6; color:#5C665F;">
              Prova a ricaricare la pagina (Cmd+R). Se il problema persiste, controlla la connessione internet, oppure il servizio di database potrebbe essere temporaneamente non raggiungibile.
              <div style="margin-top:12px"><button onclick="window.location.reload()" style="padding:10px 20px;border-radius:8px;border:none;background:#1F4A44;color:#fff;font-weight:700;cursor:pointer;font-size:14px;">Ricarica la pagina</button></div>
            </div>
          </div>`;
      }
    }, 20000);
  }

// ---------- OpenRouteService: verifica sede più vicina in tempo reale ----------
const ORS_API_KEY = 'eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjQ1NGFiNGZjOGMwNjQ4ZjNiYjhlMjU3YjJlMWVjOTFmIiwiaCI6Im11cm11cjY0In0=';

async function fetchConTimeout(url, options, timeoutMs) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    return await fetch(url, { ...(options || {}), signal: controller.signal });
  } finally {
    clearTimeout(timer);
  }
}

async function orsGeocode(query) {
  const url = `https://api.openrouteservice.org/geocode/search?api_key=${ORS_API_KEY}&text=${encodeURIComponent(query)}&size=1&boundary.country=IT`;
  const res = await fetchConTimeout(url, {}, 8000);
  if (!res.ok) throw new Error('geocode fallito: ' + res.status);
  const data = await res.json();
  const feat = data.features && data.features[0];
  if (!feat) return null;
  const [lon, lat] = feat.geometry.coordinates;
  return { lat, lon };
}

async function orsMatrix(locations, sources, destinations) {
  const res = await fetchConTimeout('https://api.openrouteservice.org/v2/matrix/driving-car', {
    method: 'POST',
    headers: { 'Authorization': ORS_API_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ locations, sources, destinations, metrics: ['duration'] }),
  }, 15000);
  if (!res.ok) throw new Error('matrix fallita: ' + res.status);
  return res.json();
}

async function getSediCoords() {
  try {
    await window.__firebaseReady;
    const v = await window.__fsGet('sedi_coords');
    return v ? JSON.parse(v) : {};
  } catch (e) { return {}; }
}
async function saveSediCoords(obj) {
  try { await window.__firebaseReady; await window.__fsSet('sedi_coords', JSON.stringify(obj)); return true; }
  catch (e) { console.error('save sedi_coords failed', e); return false; }
}

// Geocodifica le sedi mancanti UNA SOLA VOLTA e le mette in cache condivisa (Firestore),
// così le richieste successive non ripetono mai la geocodifica delle sedi.
async function ensureSediCoords() {
  let coords = await getSediCoords();
  const mancanti = sedi.filter(s => !coords[s.comune]);
  if (!mancanti.length) return coords;
  for (const s of mancanti) {
    try {
      const c = await orsGeocode(s.sede);
      if (c) coords[s.comune] = c;
    } catch (e) { console.error('geocodifica sede fallita', s.comune, e); }
    await new Promise(r => setTimeout(r, 250)); // rispetta i limiti di frequenza dell'API gratuita
  }
  await saveSediCoords(coords);
  return coords;
}

// Confronta il CAP del cliente con TUTTE le sedi (non solo quella assegnata dalla Matrice_CAP)
// usando tempi di percorrenza reali calcolati da OpenRouteService. Ritorna l'elenco ordinato
// dal più vicino, con il tempo di sola andata in minuti.
async function trovaSedePiuVicina(cap) {
  const coords = await ensureSediCoords();
  const sediConCoord = sedi.filter(s => coords[s.comune]);
  if (!sediConCoord.length) return null;
  const clientCoord = await orsGeocode(`${cap}, Italia`);
  if (!clientCoord) return null;
  const locations = sediConCoord.map(s => [coords[s.comune].lon, coords[s.comune].lat]);
  locations.push([clientCoord.lon, clientCoord.lat]);
  const sources = sediConCoord.map((_, i) => i);
  const destinations = [locations.length - 1];
  const result = await orsMatrix(locations, sources, destinations);
  const durations = (result.durations || []).map(row => row[0]);
  return sediConCoord
    .map((s, i) => ({ comune: s.comune, minutiAndata: durations[i] != null ? Math.round(durations[i] / 60) : null }))
    .filter(r => r.minutiAndata != null)
    .sort((a, b) => a.minutiAndata - b.minutiAndata);
}

// ---------- indici derivati (dinamici: sedi e tecnici sono modificabili dall'Admin) ----------
let sedi = [];
let tecnici = [];
let addrToComune = {};
let sedeByComune = {};
let tecniciByComune = {};
let sedeOwner = {}; // { comune: 'eva' | 'leo' } — a chi è assegnata la sede (l'Admin vede sempre tutto)

function rebuildIndici() {
  addrToComune = {};
  sedi.forEach(s => { addrToComune[s.sede] = s.comune; });
  sedeByComune = {};
  sedi.forEach(s => { sedeByComune[s.comune] = s; });
  tecniciByComune = {};
  tecnici.forEach(t => {
    if (!t.comune) return;
    (tecniciByComune[t.comune] = tecniciByComune[t.comune] || []).push(t);
  });
}

async function loadAnagrafica() {
  tracciaPasso('loadAnagrafica: avvio, aspetto firebaseReady');
  try {
    await window.__firebaseReady;
    tracciaPasso('loadAnagrafica: firebaseReady ok, chiedo 4 documenti');
    const [vSedi, vTecnici, vOwner, vCapMap] = await Promise.all([
      window.__fsGet('sedi_custom'),
      window.__fsGet('tecnici_custom'),
      window.__fsGet('sede_owner'),
      window.__fsGet('capmap_custom'),
    ]);
    tracciaPasso(`loadAnagrafica: 4 documenti ricevuti (sedi=${vSedi?vSedi.length:0}b tecnici=${vTecnici?vTecnici.length:0}b capMap=${vCapMap?vCapMap.length:0}b)`);
    if (vSedi && vTecnici) {
      const parsedSedi = JSON.parse(vSedi);
      const parsedTecnici = JSON.parse(vTecnici);
      if (Array.isArray(parsedSedi) && Array.isArray(parsedTecnici)) {
        sedi = parsedSedi;
        tecnici = parsedTecnici;
        sedeOwner = vOwner ? JSON.parse(vOwner) : {};
      } else {
        throw new Error('sedi_custom/tecnici_custom non sono array validi');
      }
    } else {
      // Primo avvio: semina i dati dal bundle originale (Excel) e crea l'assegnazione sedi già nota.
      sedi = BUNDLE.sedi.slice();
      const addr = {}; BUNDLE.sedi.forEach(s => { addr[s.sede] = s.comune; });
      tecnici = BUNDLE.tecnici.map(t => ({ nome: t.nome, comune: addr[t.sede] || null, competenza: t.competenza }));
      const owner = {};
      (BUNDLE.roles.eva.comuni || []).forEach(c => { owner[c] = 'eva'; });
      (BUNDLE.roles.leo.comuni || []).forEach(c => { owner[c] = 'leo'; });
      sedeOwner = owner;
      await Promise.all([
        window.__fsSet('sedi_custom', JSON.stringify(sedi)),
        window.__fsSet('tecnici_custom', JSON.stringify(tecnici)),
        window.__fsSet('sede_owner', JSON.stringify(sedeOwner)),
      ]);
    }
    if (vCapMap) {
      const parsedCapMap = JSON.parse(vCapMap);
      if (parsedCapMap && typeof parsedCapMap === 'object' && !Array.isArray(parsedCapMap)) {
        capMap = parsedCapMap;
      } else {
        throw new Error('capmap_custom non è un oggetto valido');
      }
    } else {
      // Primo avvio: migra la Matrice_CAP originale (indicizzata per centro) al nuovo formato
      // per comune diretto, così le sedi nuove non hanno bisogno di un "centro" fittizio.
      const migrata = {};
      Object.entries(BUNDLE.capMap).forEach(([cap, entry]) => {
        const [centroIdx, tempo] = entry;
        const centro = centri[centroIdx];
        migrata[cap] = [centro ? centro.comune : null, tempo];
      });
      capMap = migrata;
      await window.__fsSet('capmap_custom', JSON.stringify(capMap));
    }
  } catch (e) {
    console.error('caricamento anagrafica fallito, uso i dati di riserva', e);
    sedi = BUNDLE.sedi.slice();
    const addrFallback = {}; sedi.forEach(s => { addrFallback[s.sede] = s.comune; });
    tecnici = BUNDLE.tecnici.map(t => ({ nome: t.nome, comune: addrFallback[t.sede] || null, competenza: t.competenza }));
    sedeOwner = {};
    const capMapFallback = {};
    Object.entries(BUNDLE.capMap).forEach(([cap, entry]) => {
      const [centroIdx, tempo] = entry;
      const centroFallback = centri[centroIdx];
      capMapFallback[cap] = [centroFallback ? centroFallback.comune : null, tempo];
    });
    capMap = capMapFallback;
  }
  tracciaPasso(`loadAnagrafica: prima di rebuildIndici (sedi=${sedi.length} tecnici=${tecnici.length} capMap=${Object.keys(capMap).length})`);
  rebuildIndici();
  tracciaPasso('loadAnagrafica: rebuildIndici finito, funzione completata');
}
async function saveSediCustom() { try { await window.__firebaseReady; await window.__fsSet('sedi_custom', JSON.stringify(sedi)); return true; } catch (e) { console.error(e); return false; } }

const parametriByTipo = {};

function lookupCap(cap) {
  const cleaned = String(cap).trim().replace(/\D/g, ''); // solo cifre
  if (!cleaned) return null;
  const normalized = String(parseInt(cleaned, 10)); // rimuove eventuali zeri iniziali, es. "00058" -> "58"
  const entry = capMap[normalized];
  if (!entry) return null;
  const [comune, tempo] = entry;
  return { comune: comune || null, tempo: tempo == null ? null : tempo };
}

function semaforo(min) {
  if (min <= CAPACITA_MIN) return 'verde';
  if (min <= SOGLIA_GIALLO) return 'giallo';
  return 'rosso';
}
function semaforoLabel(s) { return s === 'verde' ? 'Verde' : s === 'giallo' ? 'Giallo' : 'Rosso'; }

function todayISO() {
  const d = new Date();
  return d.toISOString().slice(0, 10);
}
function addDaysISO(iso, n) {
  const d = new Date(iso + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0, 10);
}
function tomorrowISO() { return addDaysISO(todayISO(), 1); }
function isWeekend(iso) {
  const d = new Date(iso + 'T00:00:00');
  const day = d.getDay(); // 0 = domenica, 6 = sabato
  return day === 0 || day === 6;
}
const ORARIO_CHIUSURA = 18; // oltre le 18:00 la giornata odierna è comunque da considerarsi chiusa
function primoGiornoUtile() {
  let iso = tomorrowISO(); // non si propone mai la stessa giornata, minimo domani
  while (isWeekend(iso)) iso = addDaysISO(iso, 1);
  return iso;
}
function maxISO(a, b) { return a > b ? a : b; }

// Soglia di distanza CAP entro cui due lavori si considerano "nella stessa zona" e quindi
// da accorpare sullo stesso tecnico per accorciare il giro. Euristica basata sui CAP (non
// sulle distanze reali): valore di partenza ragionevole, regolabile se non rispecchia la realtà.
const SOGLIA_VICINANZA_CAP = 200;

// Sceglie i tecnici per un job dato un elenco di "già assegnati oggi" per ciascun tecnico.
// Priorità: 1) tecnico già impegnato NELLA STESSA ZONA con spazio (accorcia il giro),
// 2) tecnico ancora libero (apre un giro nuovo solo se serve),
// 3) tecnico già impegnato ma lontano, se ha spazio (bilancia il carico come ultima risorsa "buona"),
// 4) tecnico satura (ultima spiaggia, comunque restituito per non lasciare il job scoperto).
function scegliTecniciPerJob(job, techsDisponibili, getEsistentiPerTech, needed) {
  const capJob = Number(job.cap || 0);
  const info = techsDisponibili.map(t => {
    const suoi = getEsistentiPerTech(t.nome);
    const load = suoi.reduce((s, j) => s + (j.tempoTotale || 0), 0);
    const minDist = suoi.length ? Math.min(...suoi.map(j => Math.abs(Number(j.cap || 0) - capJob))) : Infinity;
    return { nome: t.nome, load, minDist, haGiaLavori: suoi.length > 0 };
  });
  const capienza = t => (t.load + (job.tempoTotale || 0)) <= SOGLIA_GIALLO;
  const vicinoConSpazio = info.filter(t => t.haGiaLavori && t.minDist <= SOGLIA_VICINANZA_CAP && capienza(t))
    .sort((a, b) => a.minDist - b.minDist || a.load - b.load);
  const freschi = info.filter(t => !t.haGiaLavori).sort((a, b) => a.load - b.load);
  const lontanoConSpazio = info.filter(t => t.haGiaLavori && t.minDist > SOGLIA_VICINANZA_CAP && capienza(t))
    .sort((a, b) => a.load - b.load);
  const saturi = info.filter(t => !capienza(t)).sort((a, b) => a.load - b.load);
  return [...vicinoConSpazio, ...freschi, ...lontanoConSpazio, ...saturi].slice(0, needed);
}
const TIPO_SENZA_RICAMBIO = 'Riparazione GM';
function transitoGiorniPerComune(comune) {
  const s = sedeByComune[comune];
  return (s && s.transitoGiorni) ? s.transitoGiorni : 1;
}
function computeDataMinimaRicambio(dataBase, entroCutoff, comune) {
  const transito = transitoGiorniPerComune(comune);
  const arrivoFiliale = addDaysISO(dataBase, entroCutoff ? transito : transito + 1);
  const dataMinima = addDaysISO(arrivoFiliale, 2);
  return { arrivoFiliale, dataMinima };
}
function fmtDate(iso) {
  const [y, m, d] = iso.split('-');
  return `${d}/${m}/${y}`;
}
function initials(name) {
  return name.split(' ').filter(Boolean).slice(0, 2).map(w => w[0]).join('').toUpperCase();
}
function avatarColor(seed) {
  const colors = ['#1F4A44', '#E0993A', '#2E6F7E', '#8A4B6B', '#5B7A3A', '#B0562F'];
  let h = 0; for (let i = 0; i < seed.length; i++) h = (h * 31 + seed.charCodeAt(i)) >>> 0;
  return colors[h % colors.length];
}
function uid() { return 'job_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8); }
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}
function ricalcolaOrdiniPerTecnico(nome, data, jobsArray) {
  const dayJobs = jobsArray.filter(j => j.data === data && (j.tecnici || []).includes(nome) && j.stato === 'confermato');
  dayJobs.sort((a, b) => (a.tempoPercorrenza ?? 0) - (b.tempoPercorrenza ?? 0) || String(a.cap).localeCompare(String(b.cap)));
  dayJobs.forEach((j, i) => { j.ordine = i + 1; });
}

function randomSaltHex() {
  const arr = new Uint8Array(16);
  crypto.getRandomValues(arr);
  return Array.from(arr).map(b => b.toString(16).padStart(2, '0')).join('');
}
async function hashPassword(password, salt) {
  const enc = new TextEncoder().encode(salt + ':' + password);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function renderSetPasswordPrompt(key) {
  const r = roles[key];

// ---------- ricerca CAP vicini a una sede (limitata alla stessa provincia, per non esaurire la quota gratuita) ----------
const CAP_SCAN_MAX_CANDIDATI = 150; // limite di sicurezza sulle chiamate API per singola scansione

function candidatiCapProvincia(nuovoComune, capSede) {
  const cleaned = String(capSede || '').replace(/\D/g, '');
  if (cleaned.length < 2) return [];
  const prefisso = cleaned.slice(0, 2);
  return Object.entries(capMap)
    .filter(([cap, entry]) => cap.padStart(5, '0').startsWith(prefisso) && entry[0] !== nuovoComune)
    .slice(0, CAP_SCAN_MAX_CANDIDATI);
}

async function scansionaCapVicini(comune, c) {
  const sedeInfo = sedeByComune[comune];
  if (!sedeInfo || !sedeInfo.cap) { toast('Questa sede non ha un CAP impostato: non posso cercare zone vicine.'); return; }
  const candidati = candidatiCapProvincia(comune, sedeInfo.cap);
  if (!candidati.length) { toast('Nessun CAP della stessa provincia trovato da confrontare.'); return; }

  const overlay = document.createElement('div');
  overlay.id = 'capscan-modal-root';
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal-card"><div class="modal-title">Ricerca CAP vicini a ${escapeHtml(comune)}</div><div class="modal-sub" id="capscan-progress">Preparazione…</div></div>`;
  document.body.appendChild(overlay);
  const setProgress = txt => { const el = document.getElementById('capscan-progress'); if (el) el.textContent = txt; };

  try {
    const coords = await ensureSediCoords(); // geocodifica anche la sede nuova, se manca
    const sedeCoord = coords[comune];
    if (!sedeCoord) { overlay.remove(); toast('Impossibile geocodificare l\'indirizzo della sede.'); return; }

    const capCoords = [];
    for (let i = 0; i < candidati.length; i++) {
      setProgress(`Verifica CAP ${i + 1} di ${candidati.length}… (${candidati[i][0]})`);
      try { capCoords.push(await orsGeocode(`${candidati[i][0]}, Italia`)); }
      catch (e) { capCoords.push(null); }
      await new Promise(r => setTimeout(r, 250)); // rispetta i limiti di frequenza dell'API gratuita
    }

    const validIdx = capCoords.map((cc, i) => cc ? i : null).filter(i => i !== null);
    if (!validIdx.length) { overlay.remove(); toast('Nessun CAP geocodificato con successo, riprova più tardi.'); return; }

    setProgress('Calcolo distanze…');
    const locations = [[sedeCoord.lon, sedeCoord.lat], ...validIdx.map(i => [capCoords[i].lon, capCoords[i].lat])];
    const result = await orsMatrix(locations, [0], validIdx.map((_, k) => k + 1));
    const durations = (result.durations && result.durations[0]) || [];

    const durataMediaJob = parametri.filter(p => p.tipo !== TIPO_SENZA_RICAMBIO).reduce((s, p) => s + p.durata, 0) / (parametri.length - 1);
    const budgetPercorrenzaMediaAR = BUDGET_MEDIO_PER_JOB - durataMediaJob;
    const proposte = [];
    validIdx.forEach((origIdx, k) => {
      const [cap, entry] = candidati[origIdx];
      const [comuneAttuale, tempoAttuale] = entry;
      const sec = durations[k];
      if (sec == null) return;
      const nuovoTempo = Math.round(sec / 60) * 2; // andata/ritorno stimato
      const superaBudgetOra = tempoAttuale == null || tempoAttuale > budgetPercorrenzaMediaAR;
      const rientraDopoCambio = nuovoTempo <= budgetPercorrenzaMediaAR;
      const risparmioForte = tempoAttuale != null && (tempoAttuale - nuovoTempo) >= SOGLIA_SUGGERIMENTO_MIN;
      if (tempoAttuale == null || (superaBudgetOra && rientraDopoCambio) || risparmioForte) {
        proposte.push({ cap, comuneAttuale, tempoAttuale, nuovoTempo });
      }
    });
    overlay.remove();
    mostraProposteCapVicini(comune, proposte, c);
  } catch (e) {
    console.error('scansione CAP vicini fallita', e);
    overlay.remove();
    toast('Ricerca non riuscita: controlla la connessione e riprova.');
  }
}

function mostraProposteCapVicini(comune, proposte, c) {
  const overlay = document.createElement('div');
  overlay.id = 'capscan-result-root';
  overlay.className = 'modal-overlay';
  if (!proposte.length) {
    overlay.innerHTML = `<div class="modal-card">
      <div class="modal-title">Nessuna proposta</div>
      <div class="empty-state">Nessun CAP della zona risulta più vicino a ${escapeHtml(comune)} rispetto alla sede già assegnata.</div>
      <button class="btn btn-ghost" id="capscan-chiudi" style="margin-top:14px;width:100%">Chiudi</button>
    </div>`;
    document.body.appendChild(overlay);
    document.getElementById('capscan-chiudi').onclick = () => overlay.remove();
    return;
  }
  overlay.innerHTML = `<div class="day-modal-card">
    <button class="day-modal-close" id="capscan-close">×</button>
    <div class="modal-title">CAP più vicini a ${escapeHtml(comune)}</div>
    <div class="modal-sub">${proposte.length} CAP risultano più sostenibili da questa sede (basato su un tempo di lavorazione medio stimato, target ${TARGET_JOB_GIORNO} interventi/giorno). Seleziona quali riassegnare.</div>
    ${proposte.map((p, i) => `
      <label class="pill-choice selected" style="cursor:pointer">
        <input type="checkbox" class="capscan-check" data-idx="${i}" checked style="width:auto">
        <div class="pc-main">
          <div class="pc-name">CAP ${escapeHtml(p.cap)}</div>
          <div class="pc-meta">${escapeHtml(p.comuneAttuale || '—')} (${p.tempoAttuale ?? '—'} min) → <strong>${escapeHtml(comune)}</strong> (${p.nuovoTempo} min)</div>
        </div>
      </label>`).join('')}
    <button class="btn btn-primary" id="capscan-applica" style="width:100%;margin-top:10px">Riassegna selezionati</button>
  </div>`;
  document.body.appendChild(overlay);
  overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };
  document.getElementById('capscan-close').onclick = () => overlay.remove();
  document.getElementById('capscan-applica').onclick = async () => {
    const checked = Array.from(document.querySelectorAll('.capscan-check:checked')).map(el => Number(el.dataset.idx));
    if (!checked.length) { overlay.remove(); return; }
    await refreshData();
    checked.forEach(i => { const p = proposte[i]; capMap[p.cap] = [comune, p.nuovoTempo]; });
    const ok = await saveCapMapCustom();
    overlay.remove();
    if (ok) { toast(`${checked.length} CAP riassegnati a ${comune}`); renderTecnici(c); }
    else toast('Errore nel salvataggio, riprova.');
  };
}

// Traccia visibile in pagina di ogni passo del caricamento dati, per capire dove si ferma
// senza bisogno di Console/Inspector. Compare in basso a destra, sempre in vista.
const TRACCIA_LS_KEY = 'planner_traccia_ultima_sessione';
function tracciaPasso(msg) {
  try {
    let box = document.getElementById('traccia-box');
    if (!box) {
      box = document.createElement('div');
      box.id = 'traccia-box';
      box.style.cssText = 'position:fixed;top:6px;right:6px;background:rgba(20,30,25,.92);color:#9FE0B8;padding:8px 10px;font-family:ui-monospace,Menlo,monospace;font-size:10px;line-height:1.5;z-index:99999;max-height:45vh;max-width:340px;overflow:auto;white-space:pre-wrap;border-radius:8px;';
      document.body.appendChild(box);
    }
    const ts = new Date().toISOString().slice(11, 23);
    box.textContent = `[${ts}] ${msg}\n` + box.textContent;
    // Salva anche in localStorage: sopravvive pure a un crash/blocco totale della pagina,
    // così al prossimo caricamento possiamo recuperare cosa è successo prima del blocco.
    try {
      localStorage.setItem(TRACCIA_LS_KEY, box.textContent.slice(0, 8000));
    } catch (e2) { /* localStorage pieno o non disponibile: pazienza, continuiamo comunque */ }
  } catch (e) { /* mai bloccare per la traccia stessa */ }
}
function mostraTracciaSessionePrecedente() {
  try {
    const salvata = localStorage.getItem(TRACCIA_LS_KEY);
    if (!salvata) return;
    const box = document.createElement('div');
    box.id = 'traccia-precedente-box';
    box.style.cssText = 'position:fixed;top:6px;left:6px;background:rgba(31,74,68,.96);color:#fff;padding:10px 12px;font-family:ui-monospace,Menlo,monospace;font-size:10px;line-height:1.5;z-index:99999;max-height:60vh;max-width:380px;overflow:auto;white-space:pre-wrap;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.3);';
    const titolo = document.createElement('div');
    titolo.textContent = "📋 Traccia dell'ultima sessione (prima di ricaricare)";
    titolo.style.cssText = 'font-weight:700;margin-bottom:6px;font-family:-apple-system,sans-serif;font-size:11px;';
    const chiudi = document.createElement('button');
    chiudi.textContent = '✕ Chiudi e cancella';
    chiudi.style.cssText = 'display:block;background:#fff;color:#1F4A44;border:none;border-radius:6px;padding:4px 10px;font-weight:700;cursor:pointer;font-family:-apple-system,sans-serif;font-size:10px;margin-top:8px;';
    chiudi.onclick = () => { localStorage.removeItem(TRACCIA_LS_KEY); box.remove(); };
    const testo = document.createElement('div');
    testo.textContent = salvata;
    box.appendChild(titolo);
    box.appendChild(testo);
    box.appendChild(chiudi);
    document.body.appendChild(box);
  } catch (e) { /* niente da fare */ }
}

async function refreshData() {
  tracciaPasso('refreshData: avvio (in parallelo)');
  const p1 = loadJobs().then(r => { tracciaPasso('loadJobs: completato'); return r; });
  const p2 = loadDispo().then(r => { tracciaPasso('loadDispo: completato'); return r; });
  const p3 = loadDispoTurnistica().then(r => { tracciaPasso('loadDispoTurnistica: completato'); return r; });
  const p4 = loadAuth().then(r => { tracciaPasso('loadAuth: completato'); return r; });
  const p5 = loadAnagrafica().then(r => { tracciaPasso('loadAnagrafica: completato'); return r; });
  tracciaPasso('refreshData: 5 richieste avviate, in attesa...');
  const [jobs, dispo, dispoTurnistica, auth] = await Promise.all([p1, p2, p3, p4, p5]);
  tracciaPasso('refreshData: TUTTO completato');
  state.jobs = jobs;
  state.dispo = dispo;
  state.dispoTurnistica = dispoTurnistica;
  state.auth = auth;
  state.loaded = true;
}

  renderTab();
}

let vicinanzaDebounceTimer = null;
function scheduleVicinanzaCheck(f, c) {
  if (vicinanzaDebounceTimer) clearTimeout(vicinanzaDebounceTimer);
  const capAlMomento = f.cap;
  f._vicinanza = { loading: true, checkedForCap: capAlMomento, risultati: null, error: false };
  vicinanzaDebounceTimer = setTimeout(async () => {
    try {
      const risultati = await trovaSedePiuVicina(capAlMomento);
      if (f.cap !== capAlMomento) return; // il CAP è cambiato nel frattempo, scarta
      f._vicinanza = { loading: false, checkedForCap: capAlMomento, risultati, error: false };
    } catch (e) {
      console.error('verifica vicinanza fallita', e);
      if (f.cap !== capAlMomento) return;
      f._vicinanza = { loading: false, checkedForCap: capAlMomento, risultati: null, error: true };
    }
    if (state.tab === 'nuovo') renderNuovoJob(document.getElementById('content'));
  }, 600);
}

function preserveFocus(renderFn) {
  const active = document.activeElement;
  const id = active && active.id;
  let selStart = null, selEnd = null;
  if (active && typeof active.selectionStart === 'number') {
    selStart = active.selectionStart;
    selEnd = active.selectionEnd;
  }
  renderFn();
  if (id) {
    const el = document.getElementById(id);
    if (el) {
      el.focus();
      if (selStart != null && el.setSelectionRange) {
        try { el.setSelectionRange(selStart, selEnd); } catch (e) { /* some input types don't support it */ }
      }
    }
  }
}

// ---------- helper di calcolo capacità ----------
function minutiOccupati(nome, data, excludeJobId) {
  return state.jobs
    .filter(j => j.data === data && (j.tecnici || []).includes(nome) && j.id !== excludeJobId)
    .reduce((sum, j) => sum + (j.tempoTotale || 0), 0);
}
function statoDisponibilita(nome, data) {
  // Priorità: un'assenza improvvisa inserita direttamente qui vince sempre.
  const ov = state.dispo[dispoKey(data, nome)];
  if (ov) return ov.tipo; // 'ferie' | 'malattia' | 'infortunio' | 'indisponibile'
  // altrimenti, se non c'è nulla di diretto, usa quanto calcolato dal modulo Turnistica
  const ovT = state.dispoTurnistica[dispoKey(data, nome)];
  if (ovT) return ovT.tipo;
  return 'disponibile';
}

// ============================================================
// TAB: NUOVO JOB
// ============================================================
function renderNuovoJob(c) {
  const f = state._formCache || {
    modo: 'proponi', // 'proponi' (data decisa dal sistema) | 'ora' (data e tecnico decisi subito)
    data: state.selectedDateNuovo,
    nonPrimaDi: primoGiornoUtile(),
    cap: '', cliente: '', tipo: parametri[0].tipo, note: '', tecniciScelti: [], tempoManuale: '',
    ricambioStato: 'centrale', // 'centrale' (già disponibile) | 'ordinare' (da ordinare al fornitore)
    dataArrivoCentrale: todayISO(),
    entroCutoff: true,
  };
  state._formCache = f;

  const lookup = f.cap ? lookupCap(f.cap) : null;
  const comuneBase = lookup && lookup.comune ? lookup.comune : null;
  const nonCoperto = f.cap && (!lookup || !comuneBase);
  const comune = f._comuneOverride || comuneBase; // sede effettiva (eventualmente cambiata su suggerimento di vicinanza)
  const param = parametriByTipo[f.tipo];

  // Nota: la verifica "sede più vicina" ora parte solo su richiesta esplicita (pulsante),
  // non più in automatico ad ogni CAP digitato — evita chiamate di rete continue durante la digitazione.
  const vicinanza = f._vicinanza;
  const suggerimento = (!f._comuneOverride && vicinanza && vicinanza.checkedForCap === f.cap && vicinanza.risultati && vicinanza.risultati.length)
    ? (() => {
        const migliore = vicinanza.risultati[0];
        const assegnata = vicinanza.risultati.find(r => r.comune === comuneBase);
        if (!assegnata || migliore.comune === comuneBase) return null;
        const paramCorrente = parametriByTipo[f.tipo];
        const budgetPercorrenzaAR = BUDGET_MEDIO_PER_JOB - paramCorrente.durata; // percorrenza A/R sostenibile per questo tipo di lavoro
        const percorrenzaAttualeAR = assegnata.minutiAndata * 2;
        const percorrenzaNuovaAR = migliore.minutiAndata * 2;
        const superaBudgetOra = percorrenzaAttualeAR > budgetPercorrenzaAR;
        const rientraDopoCambio = percorrenzaNuovaAR <= budgetPercorrenzaAR;
        const risparmioForte = (percorrenzaAttualeAR - percorrenzaNuovaAR) >= SOGLIA_SUGGERIMENTO_MIN;
        if ((superaBudgetOra && rientraDopoCambio) || risparmioForte) {
          return { migliore, assegnata, superaBudgetOra, rientraDopoCambio, budgetPercorrenzaAR, percorrenzaAttualeAR, percorrenzaNuovaAR };
        }
        return null;
      })()
    : null;

  const tempoMancante = !nonCoperto && !f._comuneOverride && lookup && lookup.tempo == null;
  const tempoOverride = (f._comuneOverride && vicinanza && vicinanza.risultati)
    ? (vicinanza.risultati.find(r => r.comune === f._comuneOverride) || {}).minutiAndata
    : null;
  const tempoEffettivo = f._comuneOverride
    ? (tempoOverride != null ? tempoOverride * 2 : null) // andata/ritorno stimato
    : (tempoMancante ? (f.tempoManuale !== '' && f.tempoManuale != null ? Number(f.tempoManuale) : null) : (lookup ? lookup.tempo : null));
  const tempoTotale = (tempoEffettivo != null && param) ? (tempoEffettivo + param.durata) : null;
  const stato = tempoTotale != null ? semaforo(tempoTotale) : null;
  const fuoriZona = comune && !isInScope(comune);
  const modoOra = f.modo === 'ora';
  const necessitaRicambio = f.tipo !== TIPO_SENZA_RICAMBIO;
  const dataBaseRicambio = f.ricambioStato === 'ordinare' ? (f.dataArrivoCentrale || todayISO()) : todayISO();
  const ricambioCalc = computeDataMinimaRicambio(dataBaseRicambio, f.entroCutoff, comune);

  const tecniciDisponibili = (comune && modoOra) ? (tecniciByComune[comune] || []) : [];
  const tecniciConCarico = tecniciDisponibili.map(t => {
    const occ = minutiOccupati(t.nome, f.data);
    const dispoStato = statoDisponibilita(t.nome, f.data);
    const proiezione = occ + (tempoTotale || 0);
    return { ...t, occ, residuo: CAPACITA_MIN - occ, dispoStato, proiezione, semProiezione: semaforo(proiezione) };
  }).sort((a, b) => a.occ - b.occ);

  c.innerHTML = `
    <div class="content-narrow">
      <div class="panel">
        <div class="section-title">Nuovo job</div>
        <div class="section-sub">Inserisci i dati dell'intervento: calcolo di centro mobile, tempi e disponibilità tecnici è automatico.</div>

        <div class="grid-2">
          <label class="field">
            <span class="lbl">CAP cliente</span>
            <input type="text" id="in-cap" placeholder="Es. 40132" value="${escapeHtml(f.cap)}" inputmode="numeric">
          </label>
          <label class="field">
            <span class="lbl">Cliente</span>
            <input type="text" id="in-cliente" placeholder="Nome cliente / rif." value="${escapeHtml(f.cliente)}">
          </label>
        </div>

        <label class="field">
          <span class="lbl">Tipo lavoro</span>
          <select id="in-tipo">
            ${parametri.map(p => `<option value="${escapeHtml(p.tipo)}" ${p.tipo === f.tipo ? 'selected' : ''}>${escapeHtml(p.tipo)} · ${p.durata} min · ${p.tecnici} ${p.tecnici > 1 ? 'tecnici' : 'tecnico'}</option>`).join('')}
          </select>
        </label>

        <label class="field">
          <span class="lbl">Note (opzionale)</span>
          <textarea id="in-note" placeholder="Dettagli aggiuntivi...">${escapeHtml(f.note)}</textarea>
        </label>

        ${f.cap ? renderVicinanzaBanner({ nonCoperto, vicinanza, suggerimento, comuneBase, override: f._comuneOverride, tempoEffettivo, param, tempoTotale, giaVerificato: !!(vicinanza && vicinanza.checkedForCap === f.cap) }) : ''}
        ${f.cap ? renderPreviewBox({ nonCoperto, comune, lookup, param, tempoTotale, tempoEffettivo, stato, fuoriZona, tempoMancante, f }) : ''}
      </div>

      ${(!nonCoperto && comune) ? renderModeSwitch(f) : ''}

      ${(!nonCoperto && comune && modoOra) ? `
        <div class="panel">
          <label class="field" style="max-width:220px">
            <span class="lbl">Data intervento</span>
            <input type="date" id="in-data" value="${f.data}">
          </label>
        </div>
        ${renderTecniciPicker(tecniciConCarico, param, f)}
      ` : ''}

      ${(!nonCoperto && comune && !modoOra) ? `
        <div class="panel">
          <label class="field" style="max-width:220px">
            <span class="lbl">Non proporre prima di</span>
            <input type="date" id="in-nonprima" value="${f.nonPrimaDi}">
          </label>
          <div class="banner banner-info" style="margin:4px 0 0">
            <div>🕓</div>
            <div>Il job entrerà tra i "Nuovi da proporre". Nel tab <strong>Proposte</strong> il sistema suggerirà la prima data utile in base ai tecnici disponibili, e potrai ricontattare il cliente per confermarla.</div>
          </div>
        </div>
        ${necessitaRicambio ? renderRicambioPanel(f, dataBaseRicambio, ricambioCalc, comune) : ''}
      ` : ''}

      <div class="panel" style="margin-top:16px; display:flex; justify-content:flex-end; gap:10px;">
        <button class="btn btn-ghost" id="btn-reset">Svuota</button>
        <button class="btn btn-primary" id="btn-salva" ${canSave(f, param, nonCoperto, comune, tempoTotale) ? '' : 'disabled'}>${modoOra || nonCoperto ? 'Salva job' : 'Aggiungi ai nuovi da proporre'}</button>
      </div>
    </div>
  `;

  document.getElementById('in-cap').oninput = e => { f.cap = e.target.value.trim(); f.tecniciScelti = []; f.tempoManuale = ''; f._comuneOverride = null; f._vicinanza = null; preserveFocus(() => renderNuovoJob(c)); };
  document.getElementById('in-cliente').oninput = e => { f.cliente = e.target.value; };
  document.getElementById('in-tipo').onchange = e => { f.tipo = e.target.value; f.tecniciScelti = []; renderNuovoJob(c); };
  document.getElementById('in-note').oninput = e => { f.note = e.target.value; };
  document.getElementById('btn-reset').onclick = () => { state._formCache = null; renderNuovoJob(c); };
  const manIn = document.getElementById('in-tempo-manuale');
  if (manIn) manIn.oninput = e => { f.tempoManuale = e.target.value; preserveFocus(() => renderNuovoJob(c)); };
  const dataIn = document.getElementById('in-data');
  if (dataIn) dataIn.oninput = e => { f.data = e.target.value; state.selectedDateNuovo = f.data; preserveFocus(() => renderNuovoJob(c)); };
  const nonPrimaIn = document.getElementById('in-nonprima');
  if (nonPrimaIn) nonPrimaIn.oninput = e => { f.nonPrimaDi = e.target.value; preserveFocus(() => renderNuovoJob(c)); };
  const ricStatoRadios = document.querySelectorAll('input[name="ricambio-stato"]');
  ricStatoRadios.forEach(r => { r.onchange = () => { f.ricambioStato = r.value; renderNuovoJob(c); }; });

  if (dataArrivoCentraleIn) dataArrivoCentraleIn.oninput = e => { f.dataArrivoCentrale = e.target.value; preserveFocus(() => renderNuovoJob(c)); };
  const cutoffIn = document.getElementById('in-cutoff');
  if (cutoffIn) cutoffIn.onchange = e => { f.entroCutoff = e.target.checked; renderNuovoJob(c); };
  const vicVerificaBtn = document.querySelector('.vic-verifica');
  if (vicVerificaBtn) vicVerificaBtn.onclick = () => { scheduleVicinanzaCheck(f, c); preserveFocus(() => renderNuovoJob(c)); };
  const vicUsaBtn = document.querySelector('.vic-usa');
  if (vicUsaBtn) vicUsaBtn.onclick = () => { f._comuneOverride = vicUsaBtn.dataset.comune; f.tecniciScelti = []; renderNuovoJob(c); };
  const vicAnnullaBtn = document.querySelector('.vic-annulla');
  if (vicAnnullaBtn) vicAnnullaBtn.onclick = () => { f._comuneOverride = null; f.tecniciScelti = []; renderNuovoJob(c); };
  const modeOra = document.getElementById('mode-ora');
  const modeProponi = document.getElementById('mode-proponi');
  if (modeOra) modeOra.onclick = () => { f.modo = 'ora'; renderNuovoJob(c); };
  if (modeProponi) modeProponi.onclick = () => { f.modo = 'proponi'; f.tecniciScelti = []; renderNuovoJob(c); };

  document.querySelectorAll('.tech-choice-input').forEach(inp => {
    inp.onchange = () => {
      const nome = inp.value;
      const max = param.tecnici;
      if (inp.checked) {
        if (max === 1) f.tecniciScelti = [nome];
        else {
          if (f.tecniciScelti.length >= max) f.tecniciScelti.shift();
          f.tecniciScelti.push(nome);
        }
      } else {
        f.tecniciScelti = f.tecniciScelti.filter(n => n !== nome);
      }
      renderNuovoJob(c);
    };
  });

  const btnSalva = document.getElementById('btn-salva');
  if (btnSalva) btnSalva.onclick = async () => {
    await salvaJob(f, { comune, lookup, param, tempoTotale, tempoEffettivo, stato, nonCoperto });
  };
}

function renderVicinanzaBanner({ nonCoperto, vicinanza, suggerimento, comuneBase, override, tempoEffettivo, param, tempoTotale, giaVerificato }) {
  if (nonCoperto) return '';

  // Avviso indipendente: anche con la sede migliore possibile, il tempo di percorrenza resta troppo
  // alto per il target di 3 interventi/giorno -> quella giornata va pianificata con meno lavori.
  let avvisoGiornataRidotta = '';
  if (param && tempoTotale != null) {
    // Usa il tempo reale dalla sede migliore possibile (calcolato via OpenRouteService su tutte le filiali)
    // quando disponibile; altrimenti quello attualmente in uso (dato statico) come riserva.
    const percorrenzaMigliorePossibileAR = (vicinanza && vicinanza.risultati && vicinanza.risultati.length)
      ? vicinanza.risultati[0].minutiAndata * 2
      : tempoEffettivo;
    const budgetPercorrenzaAR = BUDGET_MEDIO_PER_JOB - param.durata;
    if (percorrenzaMigliorePossibileAR != null && percorrenzaMigliorePossibileAR > budgetPercorrenzaAR) {
      const tempoTotaleMinimoStimato = percorrenzaMigliorePossibileAR + param.durata;
      const residuo = Math.max(0, CAPACITA_MIN - tempoTotaleMinimoStimato);
      const jobAggiuntivi = Math.max(0, Math.floor(residuo / BUDGET_MEDIO_PER_JOB));
      avvisoGiornataRidotta = `<div class="banner banner-warn" style="margin-bottom:12px">
        <div>⏱</div>
        <div>Questo intervento ha una percorrenza A/R (~${percorrenzaMigliorePossibileAR} min) alta anche dalla sede più vicina possibile: da sola "consuma" più del budget medio per il target di ${TARGET_JOB_GIORNO} interventi/giorno. Per il tecnico che lo prende quel giorno, prevedi realisticamente al massimo <strong>${jobAggiuntivi} intervento${jobAggiuntivi === 1 ? '' : 'i'} in più</strong> (non il target pieno), oppure valuta di spostarlo su un giorno con meno altri interventi.</div>
      </div>`;
    }
  }

  if (override) {
    return avvisoGiornataRidotta + `<div class="banner banner-info" style="margin-bottom:12px">
      <div>🧭</div>
      <div style="flex:1">Instradato a <strong>${escapeHtml(override)}</strong> invece di ${escapeHtml(comuneBase)} (verifica in tempo reale con OpenRouteService).
        <button class="link-btn vic-annulla" style="color:var(--brand-dark);font-weight:700;margin-left:6px">Annulla, usa ${escapeHtml(comuneBase)}</button>
      </div>
    </div>`;
  }
  if (vicinanza && vicinanza.loading) {
    return avvisoGiornataRidotta + `<div class="banner banner-info" style="margin-bottom:12px"><div>🧭</div><div>Verifica sede più vicina in corso…</div></div>`;
  }
  if (suggerimento) {
    const motivoCapacita = suggerimento.superaBudgetOra && suggerimento.rientraDopoCambio
      ? `Con <strong>${escapeHtml(comuneBase)}</strong> la percorrenza A/R (~${suggerimento.percorrenzaAttualeAR} min) supera il tempo sostenibile per il target di ${TARGET_JOB_GIORNO} interventi/giorno (~${Math.round(suggerimento.budgetPercorrenzaAR)} min per questo tipo di lavoro); con <strong>${escapeHtml(suggerimento.migliore.comune)}</strong> (~${suggerimento.percorrenzaNuovaAR} min) si rientra nel target.`
      : `Percorrenza A/R stimata: ${escapeHtml(comuneBase)} ~${suggerimento.percorrenzaAttualeAR} min, ${escapeHtml(suggerimento.migliore.comune)} ~${suggerimento.percorrenzaNuovaAR} min.`;
    return avvisoGiornataRidotta + `<div class="banner banner-warn" style="margin-bottom:12px">
      <div>🧭</div>
      <div style="flex:1">Questo CAP risulta più vicino a <strong>${escapeHtml(suggerimento.migliore.comune)}</strong> rispetto alla sede assegnata <strong>${escapeHtml(comuneBase)}</strong>. ${motivoCapacita}
        <button class="btn btn-sm btn-primary vic-usa" data-comune="${escapeHtml(suggerimento.migliore.comune)}" style="margin-left:6px">Usa ${escapeHtml(suggerimento.migliore.comune)}</button>
      </div>
    </div>`;
  }
  // Nessuna verifica ancora fatta per questo CAP: propone il pulsante manuale.
  if (comuneBase && !giaVerificato) {
    return avvisoGiornataRidotta + `<div class="banner banner-info" style="margin-bottom:12px">
      <div>🧭</div>
      <div style="flex:1">Vuoi verificare se una sede diversa è più vicina (calcolo su distanze reali, richiede qualche secondo)?
        <button class="btn btn-sm btn-ghost vic-verifica" style="margin-left:6px">Verifica sede più vicina</button>
      </div>
    </div>`;
  }
  return avvisoGiornataRidotta;
}

function capLabel(s) { return s === 'ferie' ? 'In ferie' : s === 'malattia' ? 'In malattia' : s === 'infortunio' ? 'In infortunio' : 'Non disponibile'; }

function canSave(f, param, nonCoperto, comune, tempoTotale) {
  if (!f.cap || !f.cliente || !f.tipo) return false;
  if (nonCoperto) return true; // salvabile come "da verificare"
  if (!comune) return false;
  if (tempoTotale == null) return false;
  if (f.modo === 'ora') {
    if (!f.data) return false;
    return f.tecniciScelti.length === param.tecnici;
  }
  const necessitaRicambio = f.tipo !== TIPO_SENZA_RICAMBIO;
  if (necessitaRicambio && f.ricambioStato === 'ordinare' && !f.dataArrivoCentrale) return false;
  return true; // modalità "proponi": basta cap/cliente/tipo risolti, la data la trova il sistema
}

async function salvaJob(f, { comune, lookup, param, tempoTotale, tempoEffettivo, stato, nonCoperto }) {
  const modoOra = !nonCoperto && f.modo === 'ora';
  const modoProponi = !nonCoperto && f.modo !== 'ora';
  const necessitaRicambio = modoProponi && f.tipo !== TIPO_SENZA_RICAMBIO;
  let ricambioInfo = null;
  let nonPrimaDiEffettivo = f.nonPrimaDi || primoGiornoUtile();
  if (necessitaRicambio && f.ricambioStato === 'filiale') {
    ricambioInfo = { stato: 'filiale', dataBase: null, entroCutoff: null, arrivoFiliale: null, dataMinima: null };
    // nessun vincolo di attesa: il ricambio è già disponibile in filiale
  } else if (necessitaRicambio) {
    const dataBaseRicambio = f.ricambioStato === 'ordinare' ? (f.dataArrivoCentrale || todayISO()) : todayISO();
    const calc = computeDataMinimaRicambio(dataBaseRicambio, f.entroCutoff, comune);
    ricambioInfo = { stato: f.ricambioStato, dataBase: dataBaseRicambio, entroCutoff: f.entroCutoff, arrivoFiliale: calc.arrivoFiliale, dataMinima: calc.dataMinima };
    nonPrimaDiEffettivo = maxISO(nonPrimaDiEffettivo, calc.dataMinima);
  }
  const job = {
    id: uid(),
    data: modoOra ? f.data : null,
    nonPrimaDi: modoProponi ? nonPrimaDiEffettivo : null,
    ricambio: ricambioInfo,
    dateRifiutate: [],
    cap: f.cap,
    comune: comune || null,
    cliente: f.cliente,
    tipoLavoro: f.tipo,
    tempoPercorrenza: nonCoperto ? null : tempoEffettivo,
    durata: param.durata,
    tempoTotale: nonCoperto ? null : tempoTotale,
    semaforo: nonCoperto ? null : stato,
    tecnici: modoOra ? f.tecniciScelti.slice() : [],
    ordine: null,
    stato: nonCoperto ? 'da_verificare' : (modoOra ? 'confermato' : 'nuovo'),
    note: f.note || '',
    createdBy: state.user,
    createdAt: Date.now(),
  };
  await refreshData(); // evita di sovrascrivere job inseriti da altri planner
  const jobs = state.jobs.concat(job);
  if (modoOra) job.tecnici.forEach(n => ricalcolaOrdiniPerTecnico(n, job.data, jobs));
  const ok = await saveJobs(jobs);
  if (ok) {
    state.jobs = jobs;
    toast(nonCoperto ? 'Job salvato come "da verificare"' : (modoProponi ? 'Job aggiunto ai nuovi da proporre' : 'Job salvato e confermato'));
    const keepMode = f.modo;
    const keepTipo = f.tipo;
    const keepNonPrima = f.nonPrimaDi;
    state._formCache = { modo: keepMode, data: f.data, nonPrimaDi: keepNonPrima, cap: '', cliente: '', tipo: keepTipo, note: '', tecniciScelti: [], tempoManuale: '', ricambioStato: 'centrale', dataArrivoCentrale: todayISO(), entroCutoff: true };
    renderNuovoJob(document.getElementById('content'));
  } else {
    toast('Errore nel salvataggio, riprova.');
  }
}

    btn.onclick = async () => {
      if (!confirm('Eliminare questo job?')) return;
      await refreshData();
      const jobs = state.jobs.filter(j => j.id !== btn.dataset.id);
      const ok = await saveJobs(jobs);
      if (ok) { state.jobs = jobs; toast('Job eliminato'); renderAgenda(c); }
    };
  });
}

// Ricalcola l'assegnazione tecnici per i job già confermati di una giornata/sede,
// raggruppando per vicinanza di CAP invece di bilanciare solo sul carico. Non tocca
// mai la data (già concordata col cliente): solo la ripartizione tra tecnici.
function ottimizzaTecniciGiorno(jobsGiorno, techsDisponibili) {
  const vanJobs = jobsGiorno.filter(j => (parametriByTipo[j.tipoLavoro] || {}).tecnici === 2);
  const singleJobs = jobsGiorno.filter(j => (parametriByTipo[j.tipoLavoro] || {}).tecnici !== 2)
    .slice().sort((a, b) => Number(a.cap || 0) - Number(b.cap || 0));

  const risultato = vanJobs.map(j => ({ job: j, tecnici: (j.tecnici || []).slice() })); // VAN: assegnazione invariata

  singleJobs.forEach(job => {
    const getEsistenti = nome => risultato.filter(r => (r.tecnici || []).includes(nome)).map(r => r.job);
    const scelti = scegliTecniciPerJob(job, techsDisponibili, getEsistenti, 1);
    risultato.push({ job, tecnici: scelti.length ? [scelti[0].nome] : (job.tecnici || []).slice() });
  });
  return risultato;
}

function apriModaleOttimizzazione(comune, data) {
  const techs = (tecniciByComune[comune] || []).filter(t => statoDisponibilita(t.nome, data) === 'disponibile');
  const jobsSede = state.jobs.filter(j => j.comune === comune && j.data === data && j.stato === 'confermato');
  const nuovaAssegnazione = ottimizzaTecniciGiorno(jobsSede, techs);
  const cambiamenti = nuovaAssegnazione.filter(r => {
    const attuali = (r.job.tecnici || []).slice().sort().join('+');
    const nuovi = (r.tecnici || []).slice().sort().join('+');
    return attuali !== nuovi;
  });

  const overlay = document.createElement('div');
  overlay.id = 'ott-modal-root';
  overlay.className = 'day-modal-overlay';

  if (!cambiamenti.length) {
    overlay.innerHTML = `
      <div class="day-modal-card">
        <button class="day-modal-close" id="ott-close">×</button>
        <div class="modal-title">Ottimizzazione tecnici — ${escapeHtml(comune)}</div>
        <div class="empty-state">L'assegnazione attuale è già ottimale: nessun raggruppamento migliore trovato.</div>
      </div>`;
  } else {
    overlay.innerHTML = `
      <div class="day-modal-card">
        <button class="day-modal-close" id="ott-close">×</button>
        <div class="modal-title">Ottimizzazione tecnici — ${escapeHtml(comune)}</div>
        <div class="modal-sub">${fmtDate(data)} · ${cambiamenti.length} lavori cambierebbero tecnico per accorciare i giri. Le date restano invariate.</div>
        ${cambiamenti.map(r => `
          <div class="job-sub-row">
            <span>${escapeHtml(r.job.cliente)} · CAP ${escapeHtml(r.job.cap)}</span>
            <span><s style="color:var(--ink-faint)">${(r.job.tecnici || []).join('+')}</s> → <strong>${r.tecnici.join('+')}</strong></span>
          </div>
        `).join('')}
        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px">
          <button class="btn btn-ghost" id="ott-annulla">Annulla</button>
          <button class="btn btn-primary" id="ott-conferma">Conferma nuova assegnazione</button>
        </div>
      </div>`;
  }
  document.body.appendChild(overlay);
  overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };
  document.getElementById('ott-close').onclick = () => overlay.remove();
  const annullaBtn = document.getElementById('ott-annulla');
  if (annullaBtn) annullaBtn.onclick = () => overlay.remove();
  const confermaBtn = document.getElementById('ott-conferma');
  if (confermaBtn) confermaBtn.onclick = () => confermaOttimizzazione(cambiamenti, data, overlay);
}

async function confermaOttimizzazione(cambiamenti, data, overlay) {
  await refreshData();
  const jobs = state.jobs.slice();
  const tecniciTocati = new Set();
  cambiamenti.forEach(r => {
    const job = jobs.find(j => j.id === r.job.id);
    if (!job) return;
    (job.tecnici || []).forEach(n => tecniciTocati.add(n));
    job.tecnici = r.tecnici.slice();
    r.tecnici.forEach(n => tecniciTocati.add(n));
  });
  tecniciTocati.forEach(n => ricalcolaOrdiniPerTecnico(n, data, jobs));
  const ok = await saveJobs(jobs);
  if (ok) {
    state.jobs = jobs;
    toast('Assegnazione tecnici aggiornata');
    overlay.remove();
    if (state.tab === 'agenda') renderTab();
  } else {
    toast('Errore nel salvataggio, riprova.');
  }
}


function renderTechRow(t, data) {
  const jobsTech = state.jobs.filter(j => j.data === data && (j.tecnici || []).includes(t.nome) && j.stato === 'confermato')

  const occ = jobsTech.reduce((s, j) => s + (j.tempoTotale || 0), 0);
  const pct = Math.min(100, Math.round((occ / CAPACITA_MIN) * 100));

        <div class="tech-mins">${nonDisp ? capLabel(dispoStato) : `${occ} / ${CAPACITA_MIN} min`}</div>

        </div>`).join('')}</div>` : ''}

function exportCsv(scope, data) {
  const jobs = state.jobs.filter(j => scope.includes(j.comune) && j.data === data);
  const header = ['Data','Cliente','CAP','Comune','Tipo Lavoro','Tempo Percorrenza','Durata','Tempo Totale','Semaforo','Tecnici','Stato','Note'];
  const rows = jobs.map(j => [j.data, j.cliente, j.cap, j.comune, j.tipoLavoro, j.tempoPercorrenza, j.durata, j.tempoTotale, j.semaforo, (j.tecnici||[]).join(' + '), j.stato, j.note]);
  const csv = [header, ...rows].map(r => r.map(v => `"${String(v == null ? '' : v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `agenda_${data}.csv`; a.click();
  URL.revokeObjectURL(url);
}

const MESI_IT = ['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];

function buildMapsUrl(sedeAddress, jobsOrdinati) {
  const origin = encodeURIComponent(sedeAddress);
  const waypoints = jobsOrdinati.map(j => encodeURIComponent(`${j.cap}, Italia`)).join('|');
  return `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${origin}&waypoints=${waypoints}&travelmode=driving`;
}

function renderCalendario(c) {
  const scope = roleScopeComuni();
  const [y, m] = state.calMonth.split('-').map(Number);
  const firstOfMonth = new Date(y, m - 1, 1);
  const daysInMonth = new Date(y, m, 0).getDate();
  const leadingBlanks = (firstOfMonth.getDay() + 6) % 7; // lun=0 ... dom=6
  const today = todayISO();
  const comuniList = ['TUTTE', ...scope];

  const jobsMese = state.jobs.filter(j =>
    j.stato === 'confermato' && j.comune && scope.includes(j.comune) &&
    (state.calSedeFilter === 'TUTTE' || j.comune === state.calSedeFilter) &&
    j.data && j.data.slice(0, 7) === state.calMonth
  );
  const jobsByDay = {};
  jobsMese.forEach(j => { (jobsByDay[j.data] = jobsByDay[j.data] || []).push(j); });

  c.innerHTML = `
    <div class="cal-header">
      <div class="cal-title" id="cal-title"></div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
        <select id="cal-sede" style="padding:8px 10px;border:1.5px solid var(--line);border-radius:8px;font-family:inherit;font-size:13px">
          ${comuniList.map(cm => `<option value="${escapeHtml(cm)}" ${state.calSedeFilter === cm ? 'selected' : ''}>${cm === 'TUTTE' ? 'Tutte le sedi' : escapeHtml(cm)}</option>`).join('')}
        </select>
        <div class="cal-nav">
          <button class="btn btn-ghost btn-sm" id="cal-prev">‹ Prec.</button>
          <button class="btn btn-ghost btn-sm" id="cal-oggi">Oggi</button>
          <button class="btn btn-ghost btn-sm" id="cal-next">Succ. ›</button>
        </div>
      </div>
    </div>
    <div class="cal-grid" style="margin-bottom:6px">
      ${GIORNI_IT.map(g => `<div class="cal-weekday">${g}</div>`).join('')}
    </div>
    <div class="cal-grid" id="cal-body"></div>
  `;
  document.getElementById('cal-title').textContent = `${MESI_IT[m - 1]} ${y}`;
  document.getElementById('cal-sede').onchange = e => { state.calSedeFilter = e.target.value; renderCalendario(c); };
  document.getElementById('cal-prev').onclick = () => { state.calMonth = shiftMonth(state.calMonth, -1); renderCalendario(c); };
  document.getElementById('cal-next').onclick = () => { state.calMonth = shiftMonth(state.calMonth, 1); renderCalendario(c); };
  document.getElementById('cal-oggi').onclick = () => { state.calMonth = todayISO().slice(0, 7); renderCalendario(c); };

  const body = document.getElementById('cal-body');
  let cellsHtml = '';
  for (let i = 0; i < leadingBlanks; i++) cellsHtml += `<div class="cal-cell empty"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const iso = `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    const jobs = jobsByDay[iso] || [];
    const isToday = iso === today;
    let semCounts = { verde: 0, giallo: 0, rosso: 0 };
    jobs.forEach(j => { if (j.semaforo) semCounts[j.semaforo]++; });
    const peggior = semCounts.rosso ? 'rosso' : semCounts.giallo ? 'giallo' : (jobs.length ? 'verde' : null);
    const byTech = {};
    jobs.forEach(j => (j.tecnici || []).forEach(n => { byTech[n] = (byTech[n] || 0) + 1; }));
    const techLines = Object.entries(byTech).slice(0, 3).map(([n, cnt]) => `${n.split(' ')[0]} (${cnt})`);
    cellsHtml += `
      <div class="cal-cell ${isToday ? 'today' : ''}" data-date="${iso}">
        <div class="cal-daynum">${d}</div>
        ${jobs.length ? `<span class="cal-jobcount badge-${peggior}" style="background:var(--${peggior==='verde'?'green-tint':peggior==='giallo'?'amber-tint':'red-tint'});color:var(--${peggior==='verde'?'green':peggior==='giallo'?'red':'red'})">${jobs.length} job</span>` : ''}
        ${techLines.map(l => `<div class="cal-techline">${escapeHtml(l)}</div>`).join('')}

  body.innerHTML = cellsHtml;
  body.querySelectorAll('.cal-cell[data-date]').forEach(cell => {
    cell.onclick = () => openDayModal(cell.dataset.date);
  });
}

function shiftMonth(ym, delta) {
  const [y, m] = ym.split('-').map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
}

function getWeekStartsISOForYear(year) {
  let d = new Date(year, 0, 1);
  const day = (d.getDay() + 6) % 7; // 0 = lunedì
  d.setDate(d.getDate() - day); // lunedì della settimana che contiene il 1° gennaio
  const weeks = [];
  const endOfYear = new Date(year, 11, 31);
  while (d <= endOfYear) {
    weeks.push(d.toISOString().slice(0, 10));
    d.setDate(d.getDate() + 7);
  }
  return weeks;
}

function statoSettimanaPerTecnico(nome, lunediISO) {
  let ferie = false, malattia = false, infortunio = false, indisponibile = false;
  for (let i = 0; i < 7; i++) {
    const iso = addDaysISO(lunediISO, i);
    const s = statoDisponibilita(nome, iso);
    if (s === 'ferie') ferie = true;
    else if (s === 'malattia') malattia = true;
    else if (s === 'infortunio') infortunio = true;
    else if (s === 'indisponibile') indisponibile = true;
  }
  if (ferie) return 'ferie';
  if (malattia) return 'malattia';
  if (infortunio) return 'infortunio';
  if (indisponibile) return 'indisponibile';
  return 'disponibile';
}

// TAB: PROPOSTE (nuovi job -> proposta data -> conferma/rifiuto cliente)
// ============================================================
// Nota: non disponendo di coordinate geografiche o di tempi di spostamento
// tra un cliente e l'altro (solo del tempo di percorrenza dalla sede), l'app
// usa come proxy di "vicinanza" l'ordinamento per tempo di percorrenza e poi
// per CAP entro la stessa giornata/tecnico: i CAP italiani sono assegnati per
// aree contigue, quindi raggruppare per CAP avvicina ragionevolmente bene gli
// interventi vicini tra loro (un pseudo-percorso, non un instradamento reale).

const ORIZZONTE_GIORNI = 30;

// Cerca la prima data utile (a partire da "non prima di") in cui è possibile
// assegnare il job rispettando disponibilità e capacità dei tecnici della sede.
// Riserva capacità anche per i job già 'proposto' (non solo 'confermato'), per
// non rischiare di proporre lo stesso slot a due clienti diversi.
function trovaDataProposta(job, jobsSnapshot) {
  const param = parametriByTipo[job.tipoLavoro];
  const techsSede = tecniciByComune[job.comune] || [];
  if (!techsSede.length) return null;

  const rifiutate = job.dateRifiutate || [];
  const start = job.nonPrimaDi || primoGiornoUtile();
  let fallback = null;

  const jobsDelGiorno = (data) => jobsSnapshot
    .filter(j => j.id !== job.id && j.data === data && (j.stato === 'proposto' || j.stato === 'confermato'));

  for (let i = 0; i < ORIZZONTE_GIORNI; i++) {
    const iso = addDaysISO(start, i);
    if (isWeekend(iso)) continue; // sabato e domenica non lavorativi
    if (rifiutate.includes(iso)) continue;
    const avail = techsSede.filter(t => statoDisponibilita(t.nome, iso) === 'disponibile');
    if (avail.length < param.tecnici) continue;

    const getEsistenti = nome => jobsDelGiorno(iso).filter(j => (j.tecnici || []).includes(nome));
    const scelti = scegliTecniciPerJob(job, avail, getEsistenti, param.tecnici);
    const maxDopo = Math.max(...scelti.map(s => s.load)) + (job.tempoTotale || 0);

    if (maxDopo <= SOGLIA_GIALLO) {
      return { data: iso, tecnici: scelti.map(s => s.nome), semaforo: semaforo(maxDopo) };
    }
    if (!fallback || maxDopo < fallback.maxDopo) {
      fallback = { data: iso, tecnici: scelti.map(s => s.nome), semaforo: semaforo(maxDopo), maxDopo };
    }
  }
  return fallback; // può essere null se nessun giorno ha abbastanza tecnici disponibili
}

async function eliminaJobProposta(jobId, c) {
  if (!confirm("Eliminare definitivamente questo job? L'operazione non è reversibile.")) return;
  await refreshData();
  const jobs = state.jobs.filter(j => j.id !== jobId);
  const ok = await saveJobs(jobs);
  if (ok) { state.jobs = jobs; toast('Job eliminato'); renderProposte(c); }
  else toast('Errore nel salvataggio, riprova.');
}

async function proponiSingolo(jobId, c) {
  await refreshData();
  const jobs = state.jobs.slice();
  const job = jobs.find(j => j.id === jobId);
  if (!job) { toast('Job non trovato (rimosso da un altro planner?)'); renderProposte(c); return; }
  const risultato = trovaDataProposta(job, jobs);
  if (!risultato) {
    toast(`Nessuna data disponibile entro ${ORIZZONTE_GIORNI} giorni per ${job.cliente}`);
    return;
  }
  job.data = risultato.data;
  job.tecnici = risultato.tecnici;
  job.semaforo = risultato.semaforo;
  job.stato = 'proposto';
  const ok = await saveJobs(jobs);
  if (ok) { state.jobs = jobs; toast(`Proposta per ${job.cliente}: ${fmtDate(job.data)}`); renderProposte(c); }
  else toast('Errore nel salvataggio, riprova.');
}

async function proponiTutti_(jobIds, c) {
  await refreshData();
  const jobs = state.jobs.slice();
  let ok_count = 0, fail_count = 0;
  const idsOrdinati = jobIds.slice().sort((a, b) => {
    const ja = jobs.find(j => j.id === a), jb = jobs.find(j => j.id === b);
    if (!ja || !jb) return 0;
    return (ja.comune || '').localeCompare(jb.comune || '') || Number(ja.cap || 0) - Number(jb.cap || 0);
  });
  idsOrdinati.forEach(id => {
    const job = jobs.find(j => j.id === id);
    if (!job || job.stato !== 'nuovo') return;
    const risultato = trovaDataProposta(job, jobs);
    if (risultato) {
      job.data = risultato.data;
      job.tecnici = risultato.tecnici;
      job.semaforo = risultato.semaforo;
      job.stato = 'proposto';
      ok_count++;
    } else {
      fail_count++;
    }
  });
  const ok = await saveJobs(jobs);
  if (ok) {
    state.jobs = jobs;
    toast(`${ok_count} proposte generate${fail_count ? `, ${fail_count} senza data disponibile` : ''}`);
    renderProposte(c);
  } else toast('Errore nel salvataggio, riprova.');
}

async function confermaProposta(jobId, c) {
  await refreshData();
  const jobs = state.jobs.slice();
  const job = jobs.find(j => j.id === jobId);
  if (!job) { toast('Job non trovato (rimosso da un altro planner?)'); renderProposte(c); return; }
  job.stato = 'confermato';
  job.tecnici.forEach(n => ricalcolaOrdiniPerTecnico(n, job.data, jobs));
  const ok = await saveJobs(jobs);
  if (ok) { state.jobs = jobs; toast(`Appuntamento confermato per ${job.cliente} il ${fmtDate(job.data)}`); renderProposte(c); }
  else toast('Errore nel salvataggio, riprova.');
}

async function rifiutaProposta(jobId, c) {
  await refreshData();
  const jobs = state.jobs.slice();
  const job = jobs.find(j => j.id === jobId);
  if (!job) { toast('Job non trovato (rimosso da un altro planner?)'); renderProposte(c); return; }
  job.dateRifiutate = (job.dateRifiutate || []).concat(job.data);
  const vecchiaData = job.data;
  const risultato = trovaDataProposta(job, jobs);
  if (!risultato) {
    job.stato = 'nuovo';
    job.data = null;
    job.tecnici = [];
    job.semaforo = null;
    const ok = await saveJobs(jobs);
    if (ok) { state.jobs = jobs; toast(`Nessun'altra data trovata entro ${ORIZZONTE_GIORNI} giorni: ${job.cliente} torna tra i "nuovi"`); renderProposte(c); }
    else toast('Errore nel salvataggio, riprova.');
    return;
  }
  job.data = risultato.data;
  job.tecnici = risultato.tecnici;
  job.semaforo = risultato.semaforo;
  // stato resta 'proposto'
  const ok = await saveJobs(jobs);
  if (ok) { state.jobs = jobs; toast(`Nuova proposta per ${job.cliente}: ${fmtDate(risultato.data)} (era ${fmtDate(vecchiaData)})`); renderProposte(c); }
  else toast('Errore nel salvataggio, riprova.');
}
